{% extends 'certificates/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-warning">
                <h3>Edit Certificate</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-warning">
                        Update Certificate
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
