{% extends 'certificates/base.html' %}

{% block content %}

<div class="card">

    <div class="card-body text-center">

        <h2>
            Delete Certificate
        </h2>

        <p>
            Are you sure you want to delete
            <strong>
                {{ certificate.student_name }}
            </strong> ?
        </p>

        <form method="POST">

            {% csrf_token %}

            <button class="btn btn-danger">
                Delete
            </button>

            <a href="{% url 'certificate_list' %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
